## AutoWhisper Base Config
## Starting configuration derived from best S5.5 sweep result.
## This config is loaded by train.py as the initial baseline.

model:
  name: "openai/whisper-small"
  mode: "full"  # "full" or "lora"
  lora:
    r: 32
    alpha: 64
    target_modules: ["q_proj", "v_proj"]
    dropout: 0.05

training:
  learning_rate: 3.0e-5
  warmup_steps: 300
  max_steps: 500
  per_device_batch_size: 4
  gradient_accumulation: 8
  fp16: true
  gradient_checkpointing: true

augmentation:
  enabled: true
  spec_augment:
    mask_time_prob: 0.05
    mask_feature_prob: 0.04

decoding:
  num_beams: 5
  max_new_tokens: 225

budget:
  time_limit_sec: 900
  eval_samples: 200
  gpu: "t4"  # "t4" or "a100"
