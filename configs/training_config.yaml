# ChildWhisper Training Configuration

common:
  sample_rate: 16000
  max_duration_sec: 30.0
  min_duration_sec: 0.3
  silence_threshold_db: -40
  trim_top_db: 30
  spec_augment:
    apply: true
    mask_time_prob: 0.05
    mask_time_length: 10
    mask_feature_prob: 0.04
    mask_feature_length: 10
  validation:
    split_ratio: 0.1
    stratify_by: age_bucket
    split_by: child_id
  augmentation:
    realclass_min_snr_db: 5.0
    realclass_max_snr_db: 20.0
    musan_min_snr_db: 0.0
    musan_max_snr_db: 15.0

whisper_small:
  model_name: openai/whisper-small
  learning_rate: 1.0e-5
  warmup_steps: 500
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  fp16: true
  gradient_checkpointing: true
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  generation_max_length: 225
  hub_model_id: nishantgaurav23/pasketti-whisper-small
  hub_private_repo: true

whisper_large_v3:
  model_name: openai/whisper-large-v3
  learning_rate: 1.0e-3
  warmup_steps: 500
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16
  fp16: true
  gradient_checkpointing: true
  load_in_8bit: true
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  generation_max_length: 225
  hub_model_id: nishantgaurav23/pasketti-whisper-lora
  hub_private_repo: true
  lora:
    r: 32
    alpha: 64
    target_modules:
      - q_proj
      - v_proj
    dropout: 0.05
    bias: none
    task_type: SEQ_2_SEQ_LM

inference:
  beam_size: 5
  batch_size: 16
  max_new_tokens: 225
  language: en
  task: transcribe
  time_limit_seconds: 5400
