<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="s3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="500" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Data Flow &amp; Validation Strategy</text>

  <!-- Competition Data Sources -->
  <rect x="30" y="70" width="170" height="90" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#s3)"/>
  <text x="115" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Competition Data</text>
  <text x="115" y="115" text-anchor="middle" font-size="10" fill="#64748b">DrivenData audio (3 zips)</text>
  <text x="115" y="130" text-anchor="middle" font-size="10" fill="#64748b">TalkBank audio (1 zip)</text>
  <text x="115" y="145" text-anchor="middle" font-size="10" fill="#64748b">train_word_transcripts.jsonl</text>

  <rect x="30" y="180" width="170" height="60" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#s3)"/>
  <text x="115" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Noise Sources</text>
  <text x="115" y="225" text-anchor="middle" font-size="10" fill="#a16207">RealClass (classroom)</text>
  <text x="115" y="240" text-anchor="middle" font-size="10" fill="#a16207">MUSAN (babble, ambient)</text>

  <!-- Arrow to preprocessing -->
  <line x1="200" y1="115" x2="260" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Preprocessing -->
  <rect x="270" y="70" width="160" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s3)"/>
  <text x="350" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">preprocess.py</text>
  <text x="350" y="115" text-anchor="middle" font-size="10" fill="#3b82f6">load_audio(16kHz mono)</text>
  <text x="350" y="130" text-anchor="middle" font-size="10" fill="#3b82f6">trim_silence(top_db=30)</text>
  <text x="350" y="145" text-anchor="middle" font-size="10" fill="#3b82f6">filter: 0.3s-30s</text>

  <line x1="430" y1="115" x2="485" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Validation Split -->
  <rect x="495" y="60" width="180" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#s3)"/>
  <text x="585" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">evaluate.py</text>
  <text x="585" y="105" text-anchor="middle" font-size="10" fill="#059669">split_by_child_id()</text>
  <text x="585" y="125" text-anchor="middle" font-size="10" fill="#059669">90% train / 10% val</text>
  <text x="585" y="145" text-anchor="middle" font-size="10" fill="#059669">Stratify: age_bucket</text>
  <text x="585" y="161" text-anchor="middle" font-size="10" fill="#059669">No speaker leakage</text>

  <!-- Train path -->
  <line x1="585" y1="170" x2="585" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Train split -->
  <rect x="495" y="215" width="80" height="35" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="535" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Train</text>

  <!-- Val split -->
  <rect x="600" y="215" width="75" height="35" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="637" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Val</text>

  <!-- Arrow from noise to augmentation -->
  <line x1="200" y1="210" x2="260" y2="295" stroke="#eab308" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Augmentation -->
  <rect x="270" y="270" width="160" height="55" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#s3)"/>
  <text x="350" y="293" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">augment.py</text>
  <text x="350" y="312" text-anchor="middle" font-size="10" fill="#a16207">audiomentations pipeline</text>

  <!-- Train -> augmentation -->
  <line x1="535" y1="250" x2="430" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Augmented -> Dataset -->
  <line x1="350" y1="325" x2="350" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Dataset -->
  <rect x="270" y="365" width="160" height="55" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#s3)"/>
  <text x="350" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">dataset.py</text>
  <text x="350" y="408" text-anchor="middle" font-size="10" fill="#16a34a">WhisperDataset + Collator</text>

  <!-- Dataset to training -->
  <line x1="430" y1="392" x2="485" y2="392" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Training scripts -->
  <rect x="495" y="350" width="180" height="90" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5" filter="url(#s3)"/>
  <text x="585" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#6b21a8">Training</text>
  <text x="585" y="395" text-anchor="middle" font-size="10" fill="#7c3aed">train_whisper_lora.py</text>
  <text x="585" y="410" text-anchor="middle" font-size="10" fill="#7c3aed">train_whisper_small.py</text>
  <text x="585" y="428" text-anchor="middle" font-size="10" fill="#7c3aed">Seq2SeqTrainer + HF Hub push</text>

  <!-- Val to evaluation -->
  <line x1="637" y1="250" x2="637" y2="270" stroke="#475569" stroke-width="1.5"/>
  <line x1="637" y1="270" x2="770" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- WER Evaluation -->
  <rect x="730" y="250" width="150" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#s3)"/>
  <text x="805" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">WER Evaluation</text>
  <text x="805" y="295" text-anchor="middle" font-size="10" fill="#dc2626">compute_wer()</text>
  <text x="805" y="310" text-anchor="middle" font-size="10" fill="#dc2626">compute_per_age_wer()</text>
  <text x="805" y="325" text-anchor="middle" font-size="10" fill="#dc2626">validation_summary()</text>

  <!-- Training -> HF Hub -->
  <line x1="675" y1="400" x2="730" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- HF Hub -->
  <rect x="730" y="370" width="150" height="55" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#s3)"/>
  <text x="805" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">HuggingFace Hub</text>
  <text x="805" y="412" text-anchor="middle" font-size="10" fill="#b45309">LoRA adapter (~63MB)</text>

  <!-- HF Hub -> Submission -->
  <line x1="805" y1="425" x2="805" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="730" y="458" width="150" height="35" rx="8" fill="#fff" stroke="#475569" stroke-width="1.5" filter="url(#s3)"/>
  <text x="805" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">submission/main.py</text>

  <!-- utils.py annotation -->
  <rect x="30" y="370" width="160" height="55" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#s3)"/>
  <text x="110" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">utils.py</text>
  <text x="110" y="413" text-anchor="middle" font-size="10" fill="#64748b">EnglishTextNormalizer</text>
  <text x="110" y="428" text-anchor="middle" font-size="10" fill="#64748b">(used everywhere)</text>

  <line x1="190" y1="400" x2="270" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a3)"/>
</svg>
