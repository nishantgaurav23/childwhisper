<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="750" rx="16" fill="url(#bg2)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Ensemble Inference Pipeline</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">A100 80GB VRAM | 2-hour limit | Offline</text>

  <!-- Step 1: Metadata -->
  <rect x="300" y="80" width="300" height="55" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="450" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">utterance_metadata.jsonl</text>
  <text x="450" y="121" text-anchor="middle" font-size="11" fill="#64748b">Sort by duration (longest first)</text>

  <line x1="450" y1="135" x2="450" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Audio Loader -->
  <rect x="300" y="165" width="300" height="50" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="450" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Batch Audio Loader</text>
  <text x="450" y="203" text-anchor="middle" font-size="11" fill="#3b82f6">16kHz mono | Silence detection | Padded batches</text>

  <line x1="450" y1="215" x2="450" y2="240" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Time Budget Decision -->
  <polygon points="450,245 550,280 450,315 350,280" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">LoRA adapter</text>
  <text x="450" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">available?</text>

  <!-- Yes arrow to Model A -->
  <line x1="350" y1="280" x2="250" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>

  <!-- No arrow to Model B directly -->
  <line x1="550" y1="280" x2="650" y2="280" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="600" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>

  <!-- Model A -->
  <rect x="50" y="250" width="200" height="60" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#sh)"/>
  <text x="150" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">Model A</text>
  <text x="150" y="293" text-anchor="middle" font-size="11" fill="#7c3aed">Whisper-large-v3 + LoRA</text>

  <!-- Model A inference -->
  <line x1="150" y1="310" x2="150" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="50" y="345" width="200" height="50" rx="8" fill="#f5f3ff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#6b21a8">Run Inference</text>
  <text x="150" y="384" text-anchor="middle" font-size="11" fill="#7c3aed">fp16 | beam=5 | all utterances</text>

  <line x1="150" y1="395" x2="150" y2="425" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- predictions_a -->
  <rect x="75" y="430" width="150" height="35" rx="8" fill="#f5f3ff" stroke="#a855f7" stroke-width="1" filter="url(#sh)"/>
  <text x="150" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#6b21a8">predictions_a</text>

  <!-- Free VRAM + time check -->
  <line x1="150" y1="465" x2="150" y2="495" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="50" y="500" width="200" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1" filter="url(#sh)"/>
  <text x="150" y="517" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Free VRAM</text>
  <text x="150" y="532" text-anchor="middle" font-size="10" fill="#dc2626">del model_a + cuda.empty_cache()</text>

  <line x1="150" y1="540" x2="150" y2="565" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Time budget diamond -->
  <polygon points="150,570 230,595 150,620 70,595" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="593" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">elapsed &lt; 90min?</text>

  <!-- Yes to Model B -->
  <line x1="230" y1="595" x2="640" y2="595" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES - run Model B</text>

  <!-- No - skip to merge -->
  <line x1="150" y1="620" x2="150" y2="670" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="120" y="650" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>

  <!-- Model B (right side) -->
  <rect x="650" y="250" width="200" height="60" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#sh)"/>
  <text x="750" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Model B</text>
  <text x="750" y="293" text-anchor="middle" font-size="11" fill="#ea580c">Whisper-small (fine-tuned)</text>

  <!-- Model B direct fallback path -->
  <line x1="750" y1="310" x2="750" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Model B inference (shared for both paths) -->
  <rect x="650" y="345" width="200" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="750" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Run Inference</text>
  <text x="750" y="384" text-anchor="middle" font-size="11" fill="#ea580c">fp16 | beam=5 | all utterances</text>

  <line x1="750" y1="395" x2="750" y2="425" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- predictions_b -->
  <rect x="675" y="430" width="150" height="35" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1" filter="url(#sh)"/>
  <text x="750" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">predictions_b</text>

  <!-- Also Model B from time check -->
  <rect x="650" y="575" width="200" height="45" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="750" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Load + Run Model B</text>
  <text x="750" y="611" text-anchor="middle" font-size="10" fill="#ea580c">(ensemble second pass)</text>

  <!-- Model B results to merger -->
  <line x1="750" y1="465" x2="750" y2="670" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="750" y1="670" x2="560" y2="670" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Prediction Merger -->
  <rect x="270" y="650" width="290" height="55" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <text x="415" y="672" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Prediction Merger</text>
  <text x="415" y="692" text-anchor="middle" font-size="11" fill="#059669">Prefer A | Fallback to B if A empty</text>

  <!-- Model A results to merger -->
  <line x1="150" y1="670" x2="270" y2="670" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow to normalizer -->
  <line x1="415" y1="705" x2="415" y2="720" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Normalizer + Output -->
  <rect x="310" y="720" width="210" height="25" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="415" y="737" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">EnglishTextNormalizer  ->  submission.jsonl</text>
</svg>
